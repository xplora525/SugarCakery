<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Sugar Cakery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --gold: #c9a96e;
    --gold-light: #e8d5b0;
    --pink: #f2d4d4;
    --rose: #d4848a;
    --cream: #fdf8f3;
    --dark: #1a1008;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: var(--dark);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    font-family: 'Cormorant Garamond', serif;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease, width 0.2s, height 0.2s, opacity 0.2s;
    mix-blend-mode: difference;
  }
  .cursor-dot {
    position: fixed;
    width: 4px;
    height: 4px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }

  /* Gallery Wrapper */
  .gallery-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* Slider Track */
  .slider {
    display: flex;
    width: 900%;
    height: 100vh;
    transition: transform 0.6s cubic-bezier(0.77, 0, 0.18, 1);
    will-change: transform;
  }

  .slide {
    width: 100vw;
    height: 100vh;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    transition: transform 0.6s ease;
    display: block;
  }

  /* Vignette overlay */
  .slide::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 40%, rgba(10,5,2,0.35) 100%),
      linear-gradient(to top, rgba(10,5,2,0.5) 0%, transparent 30%),
      linear-gradient(to bottom, rgba(10,5,2,0.3) 0%, transparent 20%);
    pointer-events: none;
    z-index: 1;
  }

  /* Top Header */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    animation: fadeDown 1s ease both;
  }

  .brand-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(11px, 2vw, 14px);
    letter-spacing: 0.4em;
    color: var(--gold-light);
    text-transform: uppercase;
    opacity: 0.9;
  }

  .brand-line {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* Bottom UI */
  .bottom-ui {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 0 32px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: fadeUp 1s ease both;
  }

  /* Dot Indicators */
  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(201, 169, 110, 0.35);
    border: 1px solid rgba(201, 169, 110, 0.5);
    transition: all 0.4s ease;
    cursor: pointer;
  }

  .dot.active {
    background: var(--gold);
    width: 22px;
    border-radius: 3px;
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(201, 169, 110, 0.6);
  }

  /* Slide Counter */
  .counter {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: rgba(232, 213, 176, 0.6);
  }

  /* Arrow Buttons */
  .arrows {
    position: fixed;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
    display: flex;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 100;
    pointer-events: none;
  }

  .arrow {
    width: 44px;
    height: 44px;
    border: 1px solid rgba(201, 169, 110, 0.4);
    background: rgba(10, 5, 2, 0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: all;
    transition: all 0.3s ease;
    color: var(--gold-light);
  }

  .arrow:hover {
    background: rgba(201, 169, 110, 0.2);
    border-color: var(--gold);
    transform: scale(1.05);
  }

  .arrow:active {
    transform: scale(0.95);
  }

  .arrow svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .arrow.prev { opacity: 0; transition: opacity 0.3s, background 0.3s, border-color 0.3s, transform 0.3s; }
  .arrow.prev.visible { opacity: 1; }
  .arrow.next.hidden { opacity: 0; pointer-events: none; }

  /* Decorative corner ornaments */
  .ornament {
    position: fixed;
    z-index: 99;
    opacity: 0.25;
    pointer-events: none;
  }
  .ornament-tl { top: 12px; left: 12px; }
  .ornament-tr { top: 12px; right: 12px; transform: scaleX(-1); }
  .ornament-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
  .ornament-br { bottom: 12px; right: 12px; transform: scale(-1); }

  /* Swipe hint */
  .swipe-hint {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: fadeUp 1.5s ease both, hintFade 3s ease 2.5s forwards;
    pointer-events: none;
  }

  .swipe-hint span {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(232, 213, 176, 0.5);
    text-transform: uppercase;
  }

  .swipe-line {
    width: 1px;
    height: 20px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: swipePulse 1.5s ease-in-out infinite;
  }

  /* Slide-in from side animation */
  .slide-entering-right {
    animation: none;
  }

  /* Progress bar */
  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--rose), var(--gold));
    z-index: 200;
    transition: width 0.6s cubic-bezier(0.77, 0, 0.18, 1);
    box-shadow: 0 0 6px rgba(201, 169, 110, 0.5);
  }

  /* Keyframes */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes hintFade {
    to { opacity: 0; }
  }

  @keyframes swipePulse {
    0%, 100% { transform: scaleY(1); opacity: 0.5; }
    50% { transform: scaleY(1.3); opacity: 1; }
  }

  /* Touch device: hide cursor */
  @media (hover: none) {
    .cursor, .cursor-dot { display: none; }
    body { cursor: auto; }
    .arrows { padding: 0 8px; }
    .arrow { width: 36px; height: 36px; }
  }
</style>
</head>

<body>

<!-- Custom cursor (desktop) -->
<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<!-- Progress bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- Corner ornaments (SVG) -->
<svg class="ornament ornament-tl" width="40" height="40" viewBox="0 0 40 40">
  <path d="M2 38 L2 2 L38 2" stroke="#c9a96e" stroke-width="1" fill="none"/>
  <path d="M2 10 L10 2" stroke="#c9a96e" stroke-width="0.5" fill="none"/>
</svg>
<svg class="ornament ornament-tr" width="40" height="40" viewBox="0 0 40 40">
  <path d="M2 38 L2 2 L38 2" stroke="#c9a96e" stroke-width="1" fill="none"/>
  <path d="M2 10 L10 2" stroke="#c9a96e" stroke-width="0.5" fill="none"/>
</svg>
<svg class="ornament ornament-bl" width="40" height="40" viewBox="0 0 40 40">
  <path d="M2 38 L2 2 L38 2" stroke="#c9a96e" stroke-width="1" fill="none"/>
  <path d="M2 10 L10 2" stroke="#c9a96e" stroke-width="0.5" fill="none"/>
</svg>
<svg class="ornament ornament-br" width="40" height="40" viewBox="0 0 40 40">
  <path d="M2 38 L2 2 L38 2" stroke="#c9a96e" stroke-width="1" fill="none"/>
  <path d="M2 10 L10 2" stroke="#c9a96e" stroke-width="0.5" fill="none"/>
</svg>

<!-- Header -->
<header class="header">
  <div class="brand">
    <div class="brand-name">Sugar Cakery</div>
    <div class="brand-line"></div>
  </div>
</header>

<!-- Arrow Nav -->
<div class="arrows">
  <button class="arrow prev" id="prevBtn" aria-label="Previous">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="arrow next" id="nextBtn" aria-label="Next">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<!-- Gallery -->
<div class="gallery-wrapper">
  <div class="slider" id="slider">
    <div class="slide"><img src="1.jpg" alt="Cake 1" loading="eager"></div>
    <div class="slide"><img src="2.jpg" alt="Cake 2" loading="lazy"></div>
    <div class="slide"><img src="3.jpg" alt="Cake 3" loading="lazy"></div>
    <div class="slide"><img src="4.jpg" alt="Cake 4" loading="lazy"></div>
    <div class="slide"><img src="5.jpg" alt="Cake 5" loading="lazy"></div>
    <div class="slide"><img src="6.jpg" alt="Cake 6" loading="lazy"></div>
    <div class="slide"><img src="7.jpg" alt="Cake 7" loading="lazy"></div>
    <div class="slide"><img src="8.jpg" alt="Cake 8" loading="lazy"></div>
    <div class="slide"><img src="9.jpg" alt="Cake 9" loading="lazy"></div>
  </div>
</div>

<!-- Swipe hint (first visit) -->
<div class="swipe-hint" id="swipeHint">
  <div class="swipe-line"></div>
  <span>swipe</span>
</div>

<!-- Bottom UI -->
<div class="bottom-ui">
  <div class="dots" id="dots"></div>
  <div class="counter" id="counter">01 / 09</div>
</div>

<script>
  const TOTAL = 9;
  let index = 0;
  let startX = 0;
  let startY = 0;
  let isDragging = false;
  let dragOffset = 0;

  const slider = document.getElementById('slider');
  const dotsContainer = document.getElementById('dots');
  const counter = document.getElementById('counter');
  const progressBar = document.getElementById('progressBar');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  // Build dots
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(d);
  }

  function updateUI() {
    // Dots
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === index);
    });
    // Counter
    const n = String(index + 1).padStart(2, '0');
    counter.textContent = `${n} / 0${TOTAL}`;
    // Progress bar
    progressBar.style.width = `${((index + 1) / TOTAL) * 100}%`;
    // Arrow visibility
    prevBtn.classList.toggle('visible', index > 0);
    nextBtn.classList.toggle('hidden', index >= TOTAL - 1);
  }

  function goTo(i, instant = false) {
    index = Math.max(0, Math.min(i, TOTAL - 1));
    if (instant) {
      slider.style.transition = 'none';
    } else {
      slider.style.transition = 'transform 0.6s cubic-bezier(0.77, 0, 0.18, 1)';
    }
    slider.style.transform = `translateX(-${index * 100}vw)`;
    updateUI();
  }

  function next() { if (index < TOTAL - 1) goTo(index + 1); }
  function prev() { if (index > 0) goTo(index - 1); }

  prevBtn.addEventListener('click', prev);
  nextBtn.addEventListener('click', next);

  // Touch events
  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy)) {
      dragOffset = dx;
      slider.style.transition = 'none';
      slider.style.transform = `translateX(calc(-${index * 100}vw + ${dx * 0.4}px))`;
    }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    const endX = e.changedTouches[0].clientX;
    const diff = startX - endX;
    if (diff > 50) next();
    else if (diff < -50) prev();
    else goTo(index); // snap back
  }, { passive: true });

  // Mouse drag (desktop)
  let mouseStartX = 0;
  let mouseDown = false;

  document.addEventListener('mousedown', e => {
    mouseDown = true;
    mouseStartX = e.clientX;
  });

  document.addEventListener('mouseup', e => {
    if (!mouseDown) return;
    mouseDown = false;
    const diff = mouseStartX - e.clientX;
    if (diff > 60) next();
    else if (diff < -60) prev();
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prev();
  });

  // Custom cursor
  const cursor = document.getElementById('cursor');
  const cursorDot = document.getElementById('cursorDot');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    cursorDot.style.left = e.clientX + 'px';
    cursorDot.style.top = e.clientY + 'px';
  });

  // Init
  updateUI();
</script>

</body>
</html>
