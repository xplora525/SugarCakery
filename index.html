<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Sugar Cakery</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #c9a96e;
  --gold-light: #e8d5b0;
  --rose: #d4848a;
  --dark: #1a1008;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--dark);
  overflow: hidden;
  font-family: 'Cinzel', serif;
}

/* Wrapper */
.gallery-wrapper {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

/* Slider */
.slider {
  display: flex;
  width: calc(100vw * 12); /* IMPORTANT */
  height: 100%;
  transition: transform 0.6s ease;
}

/* Slide */
.slide {
  width: 100vw;
  height: 100%;
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.slide img {
  width: 100%;
  height: 100vh;
  object-fit: contain;
}

/* Arrows */
.arrows {
  position: fixed;
  top: 50%;
  width: 100%;
  display: flex;
  justify-content: space-between;
  transform: translateY(-50%);
}

.arrow {
  background: rgba(0,0,0,0.5);
  border: none;
  color: white;
  font-size: 20px;
  padding: 10px;
  cursor: pointer;
}

/* Progress bar */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(to right, var(--rose), var(--gold));
  width: 0%;
}
</style>
</head>

<body>

<div class="progress-bar" id="progressBar"></div>

<div class="arrows">
  <button class="arrow" onclick="prev()">❮</button>
  <button class="arrow" onclick="next()">❯</button>
</div>

<div class="gallery-wrapper">
  <div class="slider" id="slider">

    <div class="slide"><img src="1.jpg"></div>
    <div class="slide"><img src="2.jpg"></div>
    <div class="slide"><img src="3.jpg"></div>
    <div class="slide"><img src="4.jpg"></div>
    <div class="slide"><img src="5.jpg"></div>
    <div class="slide"><img src="6.jpg"></div>
    <div class="slide"><img src="7.jpg"></div>
    <div class="slide"><img src="8.jpg"></div>
    <div class="slide"><img src="9.jpg"></div>
    <div class="slide"><img src="10.jpg"></div>
    <div class="slide"><img src="11.jpg"></div>
    <div class="slide"><img src="12.jpg"></div>

  </div>
</div>

<script>
const TOTAL = 12;
let index = 0;

const slider = document.getElementById("slider");
const progressBar = document.getElementById("progressBar");

function update() {
  slider.style.transform = `translateX(-${index * 100}vw)`;
  progressBar.style.width = ((index + 1) / TOTAL) * 100 + "%";
}

function next() {
  if (index < TOTAL - 1) {
    index++;
    update();
  }
}

function prev() {
  if (index > 0) {
    index--;
    update();
  }
}

update();
</script>

</body>
</html>
