<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Sugar Cakery</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #c9a96e;
  --rose: #d4848a;
  --dark: #1a1008;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%;
  height:100%;
  background:var(--dark);
  overflow:hidden;
  font-family:'Cinzel', serif;
}

/* Slider */
.slider {
  display:flex;
  width:1000%;
  height:100%;
  transition:transform 0.6s cubic-bezier(0.77,0,0.18,1);
}

.slide {
  width:100vw;
  height:100%;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.slide img {
  width:100%;
  max-height:100vh;
  object-fit:contain;
}

/* Progress */
.progress-bar {
  position:fixed;
  top:0; left:0;
  height:3px;
  background:linear-gradient(90deg,var(--rose),var(--gold));
  width:0%;
  z-index:100;
  transition:width 0.6s;
}

/* Arrows */
.arrows {
  position:fixed;
  top:50%;
  left:0; right:0;
  transform:translateY(-50%);
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.arrow {
  width:40px;
  height:40px;
  border-radius:50%;
  background:rgba(0,0,0,0.4);
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="progress-bar" id="progressBar"></div>

<div class="arrows">
  <button class="arrow" id="prevBtn">◀</button>
  <button class="arrow" id="nextBtn">▶</button>
</div>

<div class="slider" id="slider">

  <!-- 10 Slides -->
  <div class="slide"><img src="1.jpg"></div>
  <div class="slide"><img src="2.jpg"></div>
  <div class="slide"><img src="3.jpg"></div>
  <div class="slide"><img src="4.jpg"></div>
  <div class="slide"><img src="5.jpg"></div>
  <div class="slide"><img src="6.jpg"></div>
  <div class="slide"><img src="7.jpg"></div>
  <div class="slide"><img src="8.jpg"></div>
  <div class="slide"><img src="9.jpg"></div>
  <div class="slide"><img src="10.jpg"></div>

</div>

<script>
const TOTAL = 10;
let index = 0;
let autoSlideInterval;

const slider = document.getElementById('slider');
const progressBar = document.getElementById('progressBar');

function updateUI() {
  slider.style.transform = `translateX(-${index * 100}vw)`;
  progressBar.style.width = `${((index + 1)/TOTAL)*100}%`;
}

/* Auto Slide */
function startAutoSlide() {
  autoSlideInterval = setInterval(() => {
    if (index < TOTAL - 1) {
      index++;
    } else {
      index = 0; // restart like story loop
    }
    updateUI();
  }, 3000); // 3 seconds
}

function stopAutoSlide() {
  clearInterval(autoSlideInterval);
}

/* Buttons */
document.getElementById('nextBtn').onclick = () => {
  stopAutoSlide();
  index = (index + 1) % TOTAL;
  updateUI();
  startAutoSlide();
};

document.getElementById('prevBtn').onclick = () => {
  stopAutoSlide();
  index = (index - 1 + TOTAL) % TOTAL;
  updateUI();
  startAutoSlide();
};

/* Touch Swipe */
let startX = 0;

document.addEventListener('touchstart', e => {
  stopAutoSlide();
  startX = e.touches[0].clientX;
});

document.addEventListener('touchend', e => {
  let diff = startX - e.changedTouches[0].clientX;

  if (diff > 50) index = (index + 1) % TOTAL;
  else if (diff < -50) index = (index - 1 + TOTAL) % TOTAL;

  updateUI();
  startAutoSlide();
});

/* Pause on hover (desktop) */
document.addEventListener('mouseover', stopAutoSlide);
document.addEventListener('mouseout', startAutoSlide);

/* Start */
updateUI();
startAutoSlide();
</script>

</body>
</html>
