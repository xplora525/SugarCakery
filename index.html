<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swipe Gallery</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

.slider {
  display: flex;
  width: 900%;
  height: 100vh;
  transition: transform 0.4s ease;
}

.slide {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="slider" id="slider">
  <div class="slide"><img src="1.jpg"></div>
  <div class="slide"><img src="2.jpg"></div>
  <div class="slide"><img src="3.jpg"></div>
  <div class="slide"><img src="4.jpg"></div>
  <div class="slide"><img src="5.jpg"></div>
  <div class="slide"><img src="6.jpg"></div>
  <div class="slide"><img src="7.jpg"></div>
  <div class="slide"><img src="8.jpg"></div>
  <div class="slide"><img src="9.jpg"></div>
</div>

<script>
let slider = document.getElementById('slider');
let index = 0;
let startX = 0;

document.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});

document.addEventListener('touchend', e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) {
    index = Math.min(index + 1, 8);
  } else if (endX - startX > 50) {
    index = Math.max(index - 1, 0);
  }

  slider.style.transform = `translateX(-${index * 100}vw)`;
});
</script>

</body>
</html>
